<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal WebSite - Harry Coder</title>

<script src="https://use.fontawesome.com/d1341f9b7a.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:'Montserrat', sans-serif;

background:url("img/background.jpg");
background-size:cover;
background-position:center;
height:100vh;

display:flex;
align-items:center;
justify-content:center;
}

.box{
width:400px;
background:rgba(0,0,0,0.7);
padding:40px;
text-align:center;
color:white;
border-radius:0;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.box-img{
width:130px;
height:130px;
border-radius:50%;
border:4px solid #fbb034;
object-fit:cover;
margin-bottom:20px;
}

h1{
font-size:32px;
margin:10px 0;
text-transform:uppercase;
letter-spacing:1px;
}

h5{
font-size:16px;
color:#fbb034;
letter-spacing:2px;
margin-bottom:20px;
font-weight:400;
}

p{
font-size:14px;
line-height:1.6;
color:#ccc;
margin-bottom:30px;
}

ul{
margin:0;
padding:0;
list-style:none;
display:flex;
justify-content:center;
gap:20px;
}

ul li a{
color:white;
font-size:30px;
transition:0.3s;
}

ul li a:hover{
color:#fbb034;
transform:translateY(-5px);
}

</style>

</head>

<body>

<div class="box">

<img src="my_photo.jpg" alt="Harry Coder" class="box-img">

<h1>Harry Coder</h1>

<h5>Web Developer - Web Designer</h5>

<p>
A web developer is a programmer who specializes in the development of
World Wide Web applications that run in a web browser.
</p>

<ul>

<li>
<a href="#"><i class="fa fa-facebook-square"></i></a>
</li>

<li>
<a href="#"><i class="fa fa-twitter-square"></i></a>
</li>

<li>
<a href="#"><i class="fa fa-google-plus-square"></i></a>
</li>

</ul>

</div>

</body>
</html>
